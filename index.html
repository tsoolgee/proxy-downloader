<!DOCTYPE html>
<html>
<head>
    <title>Proxy Downloader</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            background-color: #f0f2f5;
            color: #333;
            text-align: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 40px auto;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 25px;
        }
        input[type="text"] {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            background-color: #28a745;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #218838;
        }
        #status {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            text-align: left;
            min-height: 50px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .loading::after {
            content: ' .';
            animation: dots 1s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% {
                color: rgba(0,0,0,0);
                text-shadow:
                    .25em 0 0 rgba(0,0,0,0),
                    .5em 0 0 rgba(0,0,0,0);
            }
            40% {
                color: #333;
                text-shadow:
                    .25em 0 0 rgba(0,0,0,0),
                    .5em 0 0 rgba(0,0,0,0);
            }
            60% {
                text-shadow:
                    .25em 0 0 #333,
                    .5em 0 0 rgba(0,0,0,0);
            }
            80%, 100% {
                text-shadow:
                    .25em 0 0 #333,
                    .5em 0 0 #333;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Proxy Downloader</h1>
        <p>הכנס קישור להורדה באמצעות GitHub Actions:</p>
        <input type="text" id="urlInput" placeholder="הכנס קישור כאן...">
        <button onclick="startDownload()">הורד</button>
        <div id="status">ממתין לפעולה...</div>
    </div>

    <script>
        const owner = 'tsoolgee'; // שנה ליוזר שלך ב-GitHub
        const repo = 'proxy-downloader'; // שנה לשם המאגר שלך
        const githubToken = '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'; // הטוקן שלך!
        const statusDiv = document.getElementById('status');
        let currentRunId = null;

        async function startDownload() {
            const url = document.getElementById('urlInput').value;
            if (!url) {
                statusDiv.textContent = 'אנא הכנס קישור תקין.';
                return;
            }

            statusDiv.textContent = 'מפעיל את ה-Workflow ב-GitHub...';
            statusDiv.classList.add('loading');

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        event_type: 'proxy_request',
                        client_payload: { url: url }
                    })
                });

                if (response.ok) {
                    statusDiv.textContent = 'Workflow הופעל בהצלחה! בודק סטטוס...';
                    pollWorkflowStatus();
                } else {
                    const errorData = await response.json();
                    statusDiv.textContent = `שגיאה בהפעלת Workflow: ${response.status} - ${errorData.message || 'Unknown error'}`;
                    statusDiv.classList.remove('loading');
                }
            } catch (error) {
                statusDiv.textContent = `שגיאת רשת: ${error.message}`;
                statusDiv.classList.remove('loading');
            }
        }

        async function pollWorkflowStatus() {
            const maxAttempts = 60; // כ-10 דקות המתנה (כל 10 שניות)
            let attempts = 0;

            const interval = setInterval(async () => {
                if (attempts >= maxAttempts) {
                    clearInterval(interval);
                    statusDiv.textContent = 'פג תוקף ההמתנה. אנא בדוק את ה-Action ב-GitHub ידנית.';
                    statusDiv.classList.remove('loading');
                    return;
                }
                attempts++;

                try {
                    // Get recent workflow runs
                    const runsResponse = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/downloader.yml/runs`, {
                        headers: {
                            'Authorization': `token ${githubToken}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });
                    const runsData = await runsResponse.json();
                    const latestRun = runsData.workflow_runs.find(run => run.event === 'repository_dispatch');

                    if (latestRun) {
                        currentRunId = latestRun.id;
                        statusDiv.textContent = `סטטוס Workflow (ID: ${currentRunId}): ${latestRun.status} - ${latestRun.conclusion || 'Pending'} (ניסיון ${attempts}/${maxAttempts})`;

                        if (latestRun.status === 'completed') {
                            clearInterval(interval);
                            statusDiv.classList.remove('loading');
                            if (latestRun.conclusion === 'success') {
                                statusDiv.textContent += '\nהורדה הסתיימה בהצלחה! מחפש Artifacts...';
                                await getArtifacts(latestRun.id);
                            } else {
                                statusDiv.textContent += '\nה-Workflow נכשל.';
                            }
                        }
                    } else {
                        statusDiv.textContent = `מחפש הפעלת Workflow... (ניסיון ${attempts}/${maxAttempts})`;
                    }
                } catch (error) {
                    statusDiv.textContent = `שגיאה בבדיקת סטטוס Workflow: ${error.message}`;
                    clearInterval(interval);
                    statusDiv.classList.remove('loading');
                }
            }, 10000); // בדיקה כל 10 שניות
        }

        async function getArtifacts(runId) {
            try {
                const artifactsResponse = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs/${runId}/artifacts`, {
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                const artifactsData = await artifactsResponse.json();

                if (artifactsData.artifacts && artifactsData.artifacts.length > 0) {
                    const latestArtifact = artifactsData.artifacts[0];
                    const artifactUrl = latestArtifact.archive_download_url;
                    statusDiv.textContent += `\nקובץ מוכן להורדה! לחץ כאן: <a href="${artifactUrl}" target="_blank">הורד את ${latestArtifact.name}.zip</a>`;
                } else {
                    statusDiv.textContent += '\nלא נמצאו Artifacts להורדה.';
                }
            } catch (error) {
                statusDiv.textContent += `\nשגיאה בשליפת Artifacts: ${error.message}`;
            }
        }
    </script>
</body>
</html>
