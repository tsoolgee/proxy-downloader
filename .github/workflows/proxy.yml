name: Proxy Downloader

on:
  repository_dispatch:
    types: [proxy_request]

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download file
        run: |
          mkdir -p downloads
          # שימוש ב-client_payload כדי לקבל גם את ה-ID הייחודי
          URL="${{ github.event.client_payload.url }}"
          REQ_ID="${{ github.event.client_payload.req_id }}"
          
          FILENAME=$(basename "$URL" | sed 's/\?.*//' | sed 's/\#.*//')
          if [ -z "$FILENAME" ]; then FILENAME="downloaded_file"; fi
          
          echo "Downloading $URL"
          curl -L -o "downloads/$FILENAME" "$URL"
          # שמירת ה-ID כדי שהאתר יוכל לזהות את הריצה
          echo "$REQ_ID" > "downloads/request_id.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: download-${{ github.event.client_payload.req_id }}
          path: downloads/
          retention-days: 1
